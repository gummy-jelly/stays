version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  MSA 전체 통합 docker-compose  (GHCR 이미지 기반, linux/amd64)
#
#  사용법:
#    docker compose -f docker-compose.msa.yml up        # 이미지 pull 후 실행
#    docker compose -f docker-compose.msa.yml pull       # 최신 이미지 갱신
#    docker compose -f docker-compose.msa.yml down -v    # 볼륨 포함 삭제
#
#  이미지 레지스트리: ghcr.io/gummy-jelly/stays/{service}:latest
# ─────────────────────────────────────────────────────────────────

x-db-env: &db-env
  DATABASE_URL: postgresql://postgres:stays_password@db:5432/stays_db

x-auth-env: &auth-env
  DATABASE_URL: postgresql://postgres:stays_password@db:5432/stays_db
  JWT_SECRET: local-dev-secret-minimum-32-characters!!
  JWT_EXPIRE: 30
  REFRESH_EXPIRE: 7
  REDIS_URL: redis://redis:6379/0

x-svc-env: &svc-env
  DATABASE_URL: postgresql://postgres:stays_password@db:5432/stays_db
  JWT_SECRET_KEY: local-dev-secret-minimum-32-characters!!
  REDIS_URL: redis://redis:6379

x-defaults: &defaults
  platform: linux/amd64
  restart: unless-stopped
  networks:
    - msa-net

# ─────────────────────────────────────────────────────────────────
services:

  # ── 인프라 ──────────────────────────────────────────────────────

  db:
    <<: *defaults
    image: postgres:16
    container_name: msa-db
    environment:
      POSTGRES_DB: stays_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: stays_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stays_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    <<: *defaults
    image: redis:7-alpine
    container_name: msa-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── 백엔드 서비스 ────────────────────────────────────────────────

  auth-service:
    <<: *defaults
    image: ghcr.io/gummy-jelly/stays/auth-service:latest
    container_name: auth-service
    ports:
      - "8001:8000"
    environment:
      <<: *auth-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  stays-service:
    <<: *defaults
    image: ghcr.io/gummy-jelly/stays/stays-service:latest
    container_name: stays-service
    ports:
      - "8002:8002"
    environment:
      <<: *db-env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  event-service:
    <<: *defaults
    image: ghcr.io/gummy-jelly/stays/event-service:latest
    container_name: event-service
    ports:
      - "8003:8003"
    environment:
      <<: *db-env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  coupon-service:
    <<: *defaults
    image: ghcr.io/gummy-jelly/stays/coupon-service:latest
    container_name: coupon-service
    ports:
      - "8004:8004"
    environment:
      <<: *svc-env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  booking-service:
    <<: *defaults
    image: ghcr.io/gummy-jelly/stays/booking-service:latest
    container_name: booking-service
    ports:
      - "8005:8005"
    environment:
      <<: *svc-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  notification-service:
    <<: *defaults
    image: ghcr.io/gummy-jelly/stays/notification-service:latest
    container_name: notification-service
    ports:
      - "8006:8006"
    environment:
      <<: *svc-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8006/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── API Gateway ──────────────────────────────────────────────────

  api-gateway:
    <<: *defaults
    image: ghcr.io/gummy-jelly/stays/api-gateway:latest
    container_name: api-gateway
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - stays-service
      - event-service
      - coupon-service
      - booking-service
      - notification-service

# ─────────────────────────────────────────────────────────────────
volumes:
  pgdata:
  redisdata:

networks:
  msa-net:
    driver: bridge

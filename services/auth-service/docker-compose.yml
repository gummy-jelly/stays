version: "3.9"

# ─────────────────────────────────────────────
#  auth-service 단독 개발/검증용 docker-compose
#  (linux/amd64 빌드 고정)
#
#  사용법:
#    docker compose up --build
#    docker compose down -v   (볼륨 포함 삭제)
# ─────────────────────────────────────────────

services:

  db:
    image: postgres:16
    platform: linux/amd64
    container_name: auth-db
    environment:
      POSTGRES_DB: stays_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: stays_password
    ports:
      - "5432:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
      - ../../services/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stays_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: auth-redis
    ports:
      - "6379:6379"
    volumes:
      - auth_redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: auth-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:stays_password@db:5432/stays_db
      JWT_SECRET: local-dev-secret-minimum-32-characters!!
      JWT_EXPIRE: 30
      REFRESH_EXPIRE: 7
      REDIS_URL: redis://redis:6379/0
      SERVICE_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  auth_pgdata:
  auth_redisdata:
